<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <title>מיכאל בלוך — ניהול</title>

    <meta name="theme-color" content="#0a0a0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ניהול" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- מוחל את מצב היום לפני הציור הראשון — מונע הבזק כהה -->
    <script>
      try {
        if (localStorage.getItem('mb_theme') === 'light') {
          document.documentElement.dataset.theme = 'light';
        }
      } catch (e) {}
    </script>

    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="/assets/icon-180.png" />
    <link rel="icon" href="/assets/icon-192.png" />
    <link rel="stylesheet" href="./manager.css" />
  </head>
  <body>
    <!-- ═══════════════════ מסך כניסה ═══════════════════ -->
    <section id="login-screen" class="login" hidden>
      <div class="login__inner">
        <div class="login__logo" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none">
            <path
              d="M24 4 44 18 24 44 4 18 24 4Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
            />
            <path
              d="M4 18h40M24 4l-8 14 8 26 8-26-8-14"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linejoin="round"
              opacity=".55"
            />
          </svg>
        </div>
        <h1 class="login__title">מיכאל בלוך</h1>
        <p class="login__subtitle">מערכת ניהול הזמנות</p>

        <!-- כניסה מהירה עם Face ID -->
        <button id="btn-passkey-login" class="btn btn--primary btn--lg" hidden>
          <svg
            class="btn__ico"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden="true"
          >
            <path
              d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
            />
            <path
              d="M9 10v1.5M15 10v1.5M9.5 15.5c1.5 1.2 3.5 1.2 5 0"
              stroke="currentColor"
              stroke-width="1.7"
              stroke-linecap="round"
            />
          </svg>
          כניסה עם Face ID
        </button>

        <!-- כניסה עם קוד סודי -->
        <form id="form-code" class="login__form">
          <input
            id="input-code"
            class="input input--code"
            type="password"
            autocomplete="current-password"
            placeholder="קוד סודי"
            aria-label="קוד סודי"
            required
          />
          <button id="btn-code" class="btn btn--ghost" type="submit">
            כניסה
          </button>
        </form>

        <p
          id="login-msg"
          class="login__msg"
          role="status"
          aria-live="polite"
        ></p>
      </div>
    </section>

    <!-- ═══════════════════ האפליקציה ═══════════════════ -->
    <div id="app" class="app" hidden>
      <!-- כותרת + מסננים -->
      <header class="topbar">
        <div class="topbar__row">
          <h1 id="view-title" class="topbar__title">הזמנות</h1>
          <div class="topbar__actions">
            <span id="live-dot" class="live" title="חיבור חי"></span>
            <button id="btn-menu" class="icon-btn" aria-label="הגדרות">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="5" r="1.6" fill="currentColor" />
                <circle cx="12" cy="12" r="1.6" fill="currentColor" />
                <circle cx="12" cy="19" r="1.6" fill="currentColor" />
              </svg>
            </button>
          </div>
        </div>

        <!-- מסננים לפי סטטוס (רק בתצוגת הזמנות) -->
        <nav id="filters" class="filters" aria-label="סינון לפי סטטוס"></nav>
      </header>

      <!-- ── תצוגת הזמנות ── -->
      <main id="view-orders" class="view">
        <div id="orders-list" class="orders"></div>
        <div id="orders-empty" class="empty" hidden>
          <p class="empty__title">אין הזמנות</p>
          <p class="empty__text">הזמנות חדשות יופיעו כאן אוטומטית.</p>
        </div>
      </main>

      <!-- ── תצוגת קולקציה ── -->
      <main id="view-collection" class="view" hidden>
        <button id="btn-add-creation" class="add-tile">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 5v14M5 12h14"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <span>הוספת תכשיט לקולקציה</span>
        </button>

        <div id="collection-grid" class="grid"></div>
        <div id="collection-empty" class="empty" hidden>
          <p class="empty__title">הקולקציה ריקה</p>
          <p class="empty__text">הוסיפו תכשיט ראשון עם הכפתור למעלה.</p>
        </div>
      </main>

      <!-- לשוניות תחתונות -->
      <nav class="tabbar" aria-label="ניווט ראשי">
        <button class="tab is-active" data-view="orders" aria-current="page">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 6h16M4 12h16M4 18h10"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>
          <span>הזמנות</span>
          <em id="tab-badge" class="tab__badge" hidden>0</em>
        </button>
        <button class="tab" data-view="collection">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 3 20 9l-8 12L4 9l8-6Z"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
            <path
              d="M4 9h16M12 3 9 9l3 12 3-12-3-6"
              stroke="currentColor"
              stroke-width="1.1"
              stroke-linejoin="round"
              opacity=".5"
            />
          </svg>
          <span>קולקציה</span>
        </button>
      </nav>
    </div>

    <!-- ═══════════════════ גיליון הגדרות ═══════════════════ -->
    <div id="sheet-backdrop" class="backdrop" hidden></div>
    <section id="sheet-settings" class="sheet" hidden aria-label="הגדרות">
      <div class="sheet__grip" aria-hidden="true"></div>
      <h2 class="sheet__title">הגדרות</h2>
      <p id="settings-status" class="sheet__meta"></p>

      <!-- מצב יום / לילה -->
      <button
        id="btn-theme"
        class="row-btn row-switch"
        role="switch"
        aria-checked="false"
      >
        <svg id="theme-ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linejoin="round"
          />
        </svg>
        <span id="theme-label" class="row-switch__label">מצב לילה</span>
        <span class="switch" aria-hidden="true">
          <span class="switch__dot"></span>
        </span>
      </button>

      <button id="btn-register-passkey" class="row-btn">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
          />
          <path
            d="M9 10v1.5M15 10v1.5M9.5 15.5c1.5 1.2 3.5 1.2 5 0"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
          />
        </svg>
        <span>הפעלת Face ID במכשיר הזה</span>
      </button>

      <button id="btn-refresh" class="row-btn">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M20 12a8 8 0 1 1-2.3-5.6M20 4v4h-4"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>רענון נתונים</span>
      </button>

      <button id="btn-logout" class="row-btn row-btn--danger">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4M10 8 6 12l4 4M6 12h11"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>התנתקות</span>
      </button>
    </section>

    <!-- ═══════════════════ טופס תכשיט (הוספה / עריכה) ═══════════════════ -->
    <div id="product-backdrop" class="backdrop" hidden></div>
    <section
      id="sheet-product"
      class="sheet sheet--form"
      hidden
      aria-label="פרטי תכשיט"
    >
      <div class="sheet__grip" aria-hidden="true"></div>
      <h2 id="product-title" class="sheet__title">תכשיט חדש</h2>

      <form id="form-product" class="form">
        <!-- תמונה -->
        <div class="field">
          <label class="field__label" for="pick-img">תמונה</label>
          <button id="pick-img" class="picker picker--empty" type="button">
            <span id="pick-img-ph" class="picker__ph">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M4 16l4.6-4.6a2 2 0 0 1 2.8 0L16 16M14 14l1.6-1.6a2 2 0 0 1 2.8 0L20 14M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <img id="pick-img-prev" class="picker__img" alt="" hidden />
            <span class="picker__txt">
              <span id="pick-img-v" class="picker__v">בחירת תמונה</span>
              <span class="picker__hint">נדחסת אוטומטית ל-WebP</span>
            </span>
          </button>
          <input id="file-img" type="file" accept="image/*" hidden />
        </div>

        <!-- שם -->
        <div class="field">
          <label class="field__label" for="input-name">שם התכשיט</label>
          <input
            id="input-name"
            class="input"
            type="text"
            placeholder="לדוגמה: טבעת סוליטר"
            required
          />
        </div>

        <!-- קובץ תלת־ממד (אופציונלי) -->
        <div class="field">
          <label class="field__label" for="pick-3d"
            >קובץ תלת־ממד (אופציונלי)</label
          >
          <div style="display: flex; gap: 8px; align-items: center">
            <button id="pick-3d" class="picker picker--empty" type="button">
              <span class="picker__ph">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M12 3 20 7.5v9L12 21l-8-4.5v-9L12 3Z"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M4 7.5 12 12m0 0 8-4.5M12 12v9"
                    stroke="currentColor"
                    stroke-width="1.6"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="picker__txt">
                <span id="pick-3d-v" class="picker__v">בחירת קובץ</span>
                <span id="pick-3d-hint" class="picker__hint"
                  >3dm, stl, obj, step…</span
                >
              </span>
            </button>
            <button
              id="btn-3d-clear"
              class="picker__x"
              type="button"
              aria-label="הסרת הקובץ"
              hidden
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M6 6l12 12M18 6 6 18"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linecap="round"
                />
              </svg>
            </button>
          </div>
          <input id="file-3d" type="file" hidden />
        </div>

        <div id="product-progress" class="progress" hidden>
          <div id="product-bar" class="progress__bar"></div>
        </div>

        <div class="form__actions">
          <button id="btn-product-save" class="btn btn--primary btn--lg" type="submit">
            שמירה
          </button>
          <button id="btn-product-cancel" class="row-btn row-btn--plain" type="button">
            <span>ביטול</span>
          </button>
        </div>
      </form>
    </section>

    <!-- ═══════════════════ הצעת Face ID (אחרי כניסה ראשונה) ═══════════════════ -->
    <div id="onboard-backdrop" class="backdrop" hidden></div>
    <section id="sheet-onboard" class="sheet" hidden aria-label="הפעלת Face ID">
      <div class="sheet__grip" aria-hidden="true"></div>
      <div class="onboard">
        <div class="onboard__ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
            <path
              d="M9 10v1.5M15 10v1.5M9.5 15.5c1.5 1.2 3.5 1.2 5 0"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
        </div>
        <h2 class="sheet__title">להפעיל Face ID?</h2>
        <p class="onboard__text">
          בפעם הבאה תיכנסו מיד עם Face ID — בלי להקליד את הקוד הסודי.
        </p>
      </div>

      <button id="btn-onboard-yes" class="btn btn--primary btn--lg">
        הפעלת Face ID
      </button>
      <button id="btn-onboard-no" class="row-btn row-btn--plain">
        <span>לא עכשיו</span>
      </button>
    </section>

    <!-- ═══════════════════ תצוגת תמונה מלאה ═══════════════════ -->
    <div id="lightbox" class="lightbox" hidden>
      <button class="lightbox__close" aria-label="סגירה">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M6 6l12 12M18 6 6 18"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <img id="lightbox-img" alt="" />
    </div>

    <!-- הודעות -->
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <script type="module" src="./manager.js"></script>
  </body>
</html>
